<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Lexicon — browser-based JSON explorer" />
  <title>Lexicon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
</head>

<body>

  <!-- Header -->
  <header class="header" role="banner">
    <div class="header__left">
      <span class="wordmark">Lexicon</span>
      <span class="wordmark-subtitle">json explorer</span>
    </div>

    <div class="header__center">
      <div class="mode-toggle" role="tablist" aria-label="View mode">
        <button class="mode-toggle__item mode-toggle__item--active" role="tab" aria-selected="true"
          data-mode="explorer">Explorer</button>
        <button class="mode-toggle__item" role="tab" aria-selected="false" data-mode="diff">Diff</button>
      </div>
    </div>

    <div class="header__right">
      <kbd class="kbd-chip">⌘ K</kbd>
      <div class="header__separator"></div>
      <button class="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark mode">
        <svg class="icon icon--moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
        <svg class="icon icon--sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" style="display:none">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
      </button>
    </div>
  </header>

  <!-- Main workspace -->
  <main class="workspace" role="main">

    <!-- Input pane -->
    <section class="pane pane--input" aria-label="JSON input">

      <!-- Input mode tabs -->
      <div class="input-tabs" role="tablist" aria-label="Input mode">
        <button class="input-tab input-tab--active" role="tab" aria-selected="true" aria-controls="panel-paste"
          data-tab="paste">Paste</button>
        <button class="input-tab" role="tab" aria-selected="false" aria-controls="panel-url" data-tab="url">URL</button>
      </div>

      <!-- Paste panel -->
      <div class="input-panel" id="panel-paste" role="tabpanel">
        <div class="pane__toolbar">
          <button class="toolbar-btn" id="btn-format" title="Format JSON (⌘⇧F)" aria-label="Format JSON">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="16 18 22 12 16 6" />
              <polyline points="8 6 2 12 8 18" />
            </svg>
          </button>
          <button class="toolbar-btn" id="btn-copy-raw" title="Copy raw JSON" aria-label="Copy raw JSON">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
          </button>
          <button class="toolbar-btn" id="btn-clear" title="Clear input" aria-label="Clear input">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        <textarea id="json-input" class="json-textarea" spellcheck="false" autocorrect="off" autocapitalize="off"
          aria-label="JSON input area" placeholder='Paste JSON here...

{
  "user": {
    "name": "..."
  }
}

⌘↵ to parse  ·  ⌘⇧F to format'></textarea>
      </div>

      <!-- URL panel -->
      <div class="input-panel input-panel--hidden" id="panel-url" role="tabpanel">
        <div class="url-panel">

          <div class="url-input-row">
            <input type="url" id="url-input" class="url-input" placeholder="https://api.github.com/users/torvalds"
              spellcheck="false" aria-label="JSON URL" />
            <button class="url-fetch-btn" id="btn-fetch" aria-label="Fetch URL">
              Load
            </button>
          </div>

          <!-- Fetch status -->
          <div class="fetch-status" id="fetch-status" hidden>
            <span class="fetch-status__icon" id="fetch-status-icon"></span>
            <span class="fetch-status__text" id="fetch-status-text"></span>
          </div>

          <!-- Quick URLs -->
          <div class="quick-urls">
            <p class="quick-urls__label">Try these</p>
            <button class="quick-url-btn" data-url="https://api.github.com/users/torvalds">
              github.com/users/torvalds
            </button>
            <button class="quick-url-btn" data-url="https://jsonplaceholder.typicode.com/users/1">
              jsonplaceholder — user
            </button>
            <button class="quick-url-btn" data-url="https://jsonplaceholder.typicode.com/posts">
              jsonplaceholder — posts
            </button>
            <button class="quick-url-btn" data-url="https://api.github.com/repos/microsoft/vscode">
              github.com/repos/vscode
            </button>
          </div>

        </div>
      </div>

      <!-- Error strip — shared between both panels -->
      <div class="error-strip" id="error-strip" role="alert" aria-live="polite" hidden>
        <span class="error-strip__message" id="error-message"></span>
        <button class="error-strip__close" id="btn-error-close" aria-label="Dismiss error">×</button>
      </div>

    </section>

    <!-- Resizable divider -->
    <div class="pane-divider" id="pane-divider" role="separator" aria-orientation="vertical" aria-label="Resize panes">
    </div>

    <!-- Output pane -->
    <section class="pane pane--output" aria-label="JSON tree output">

      <!-- Output toolbar — hidden until JSON is parsed -->
      <div class="output-toolbar" id="output-toolbar" hidden>
        <div class="output-toolbar__left">
          <span class="output-toolbar__label">Collapse to</span>
          <div class="depth-btns" role="group" aria-label="Collapse to depth">
            <button class="depth-btn" data-depth="0" title="Collapse all">All</button>
            <button class="depth-btn" data-depth="1" title="Show depth 1">1</button>
            <button class="depth-btn" data-depth="2" title="Show depth 2">2</button>
            <button class="depth-btn" data-depth="3" title="Show depth 3">3</button>
          </div>
        </div>
        <div class="output-toolbar__right">
          <button class="output-action-btn" id="btn-expand-all" title="Expand all (⌘⇧A)">
            Expand all
          </button>
          <button class="output-action-btn" id="btn-collapse-all" title="Collapse all (⌘⇧0)">
            Collapse all
          </button>
        </div>
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="empty-state">
        <div class="empty-state__icon">{ }</div>
        <p class="empty-state__title">Paste JSON to explore</p>
        <p class="empty-state__hint">⌘↵ to parse · ⌘⇧D for diff mode</p>
        <p class="empty-state__supports">
          Supports: Objects · Arrays · Nested structures · Unicode
        </p>
      </div>

      <!-- Tree container -->
      <div class="tree-container" id="tree-container" role="tree" aria-label="JSON tree" tabindex="0" hidden></div>

    </section>

  </main>

  <!-- Status bar -->
  <footer class="status-bar" role="contentinfo">
    <div class="status-bar__left" id="status-left">
      <span class="status-chip" id="status-nodes" hidden>0 nodes</span>
      <span class="status-chip" id="status-depth" hidden>depth: 0</span>
      <span class="status-chip" id="status-size" hidden>~0KB</span>
    </div>
    <div class="status-bar__right" id="status-right">
      <span class="status-chip status-chip--path" id="status-path" hidden></span>
    </div>
  </footer>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true" hidden>
    <span class="toast__check">✓</span>
    <div class="toast__content">
      <span class="toast__label" id="toast-label"></span>
      <span class="toast__value" id="toast-value"></span>
    </div>
  </div>

  <script src="src/utils.js"></script>
  <script src="src/parser.js"></script>
  <script src="src/fetcher.js"></script>
  <script src="src/renderer.js"></script>
  <script src="src/main.js"></script>
</body>

</html>
